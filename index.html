<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 · 유한양행 인증/이수 관리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F6F1;
    --paper:#FFFFFF;
    --ink:#152420;
    --muted:#67746C;
    --line:#DCE3DA;
    --primary:#1F6F54;
    --primary-dark:#0F4A37;
    --primary-tint:#E4F1EA;
    --accent:#E2853B;
    --accent-tint:#FCEADA;
    --danger:#C2542F;
    --danger-tint:#FBE7E1;
    --shadow: 0 10px 30px rgba(15,60,45,0.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:"Pretendard","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    user-select:none;-webkit-user-select:none;
  }
  input{user-select:text;-webkit-user-select:text;font-family:inherit;}
  button, select{font-family:inherit;}
  .mono{font-family:"IBM Plex Mono", monospace;}

  .wrap{max-width:960px;margin:0 auto;min-height:100vh;padding:0 20px;display:flex;flex-direction:column;}

  /* ---- Login ---- */
  .login-wrap{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 20px;
  }
  .mark{
    width:60px;height:60px;border-radius:18px;background:var(--primary);color:#fff;
    display:flex;align-items:center;justify-content:center;margin-bottom:18px;
  }
  .mark svg{width:28px;height:28px;}
  .eyebrow{font-family:"IBM Plex Mono", monospace;font-size:11px;color:var(--primary);letter-spacing:0.14em;font-weight:600;}
  .title{font-size:21px;font-weight:800;letter-spacing:-0.02em;margin:10px 0 8px;}
  .desc{font-size:13px;color:var(--muted);line-height:1.6;max-width:340px;margin-bottom:26px;}
  .field-input{
    width:100%;max-width:280px;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;
    font-size:14px;outline:none;margin-bottom:8px;text-align:center;
  }
  .field-input:focus{border-color:var(--primary);}
  .field-error{font-size:11.5px;color:var(--danger);margin-bottom:14px;min-height:14px;font-weight:600;}
  .primary-btn{
    width:100%;max-width:280px;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:13px;
    font-size:14px;font-weight:700;cursor:pointer;
  }

  /* ---- Main ---- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:24px 0 16px;flex-shrink:0;gap:12px;flex-wrap:wrap;
  }
  .topbar-title{font-size:20px;font-weight:800;letter-spacing:-0.01em;}
  .topbar-actions{display:flex;gap:8px;}
  .ghost-btn{
    padding:9px 14px;border:1px solid var(--line);background:var(--paper);border-radius:10px;
    font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;
  }

  .stats-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .stat-card{
    flex:1;min-width:100px;background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;box-shadow:var(--shadow);
  }
  .stat-num{font-family:"IBM Plex Mono", monospace;font-size:22px;font-weight:700;color:var(--ink);}
  .stat-label{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .stat-card.done .stat-num{color:var(--primary-dark);}
  .filter-card{cursor:pointer;transition:box-shadow .15s ease, border-color .15s ease;}
  .filter-card:hover{border-color:var(--primary);}
  .filter-card.active{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-tint) inset, var(--shadow);}
  .filter-hint{font-size:11.5px;color:var(--muted);margin:-6px 0 14px;}

  .toolbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px;
  }
  .search-input{
    flex:1;min-width:160px;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;outline:none;
  }
  .search-input:focus{border-color:var(--primary);}
  .sort-select{
    padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:12.5px;background:var(--paper);color:var(--ink);
  }

  .list-wrap{flex:1;padding-bottom:40px;}
  .req-card{
    background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px 16px;
    margin-bottom:8px;box-shadow:var(--shadow);
  }
  .req-row1{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .req-row2{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
  .req-name{font-size:13.5px;font-weight:800;letter-spacing:-0.01em;min-width:76px;flex-shrink:0;}
  .req-field{display:flex;align-items:baseline;gap:6px;min-width:0;}
  .req-field-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.02em;flex-shrink:0;}
  .req-field-value{font-size:12px;color:var(--ink);white-space:nowrap;}
  .req-badges{display:flex;gap:6px;flex-shrink:0;}
  .action-cell{display:flex;gap:6px;flex-shrink:0;margin-left:auto;}
  .td-name{font-weight:700;}
  .badge{
    display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
    font-family:"IBM Plex Mono", monospace;letter-spacing:0.02em;white-space:nowrap;
  }
  .badge.pending{background:var(--accent-tint);color:var(--danger);}
  .badge.approved{background:var(--primary-tint);color:var(--primary-dark);}
  .badge.done{background:var(--primary);color:#fff;}
  .badge.notdone{background:var(--line);color:var(--muted);}
  .key-chip{font-family:"IBM Plex Mono", monospace;font-size:12px;font-weight:700;color:var(--ink);}
  .btn-approve{padding:6px 11px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;}
  .btn-revoke{padding:6px 11px;border:1px solid var(--danger-tint);border-radius:8px;background:var(--danger-tint);color:var(--danger);font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;}
  .btn-copy{padding:4px 8px;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink);font-weight:600;font-size:10.5px;cursor:pointer;white-space:nowrap;}
  .time-cell{font-size:11.5px;color:var(--muted);white-space:nowrap;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:60px 20px;}

  /* ---- Tabs ---- */
  .tab-row{display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid var(--line);}
  .tab-btn{
    padding:10px 4px;margin-right:12px;border:none;background:none;color:var(--muted);
    font-size:13.5px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;
  }
  .tab-btn.active{color:var(--primary-dark);border-bottom-color:var(--primary);}

  /* ---- Manual view ---- */
  .manual-section{margin-bottom:28px;}
  .manual-section-title{
    font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-0.01em;
    margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line);
  }
  .manual-item{
    display:flex;gap:14px;background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);
  }
  .manual-item-num{
    flex-shrink:0;font-size:11px;font-weight:700;color:var(--primary-dark);background:var(--primary-tint);
    padding:4px 9px;border-radius:8px;height:fit-content;letter-spacing:0.02em;
  }
  .manual-item-body{flex:1;min-width:0;}
  .manual-item-title{font-size:14px;font-weight:700;margin-bottom:6px;}
  .manual-item-text{font-size:13px;line-height:1.6;color:#2B3A34;}
  .manual-item-sub{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5;}
  .manual-list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px;}
  .manual-list li{font-size:13px;line-height:1.55;color:#2B3A34;padding-left:14px;position:relative;}
  .manual-list li::before{content:"";position:absolute;left:0;top:7px;width:4px;height:4px;border-radius:50%;background:var(--accent);}
  .manual-note{margin-top:8px;background:var(--primary-tint);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--primary-dark);}
  .manual-links{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .manual-link{font-size:11.5px;font-weight:700;color:var(--primary-dark);text-decoration:none;background:var(--primary-tint);padding:5px 10px;border-radius:20px;}
</style>
</head>
<body oncontextmenu="return false;">

<div class="wrap">

  <!-- LOGIN -->
  <div class="login-wrap" id="loginView">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.4 8.4-8 10-4.6-1.6-8-5-8-10V6z"/><path d="M9 12l2 2 4-4"/></svg>
    </div>
    <div class="eyebrow">VOICE OF YUHAN · ADMIN</div>
    <div class="title">관리자 로그인</div>
    <div class="desc">보건지소·진료소 영업 매뉴얼의 인증 요청과 교육 이수 현황을 확인하고 관리하는 관리자 전용 페이지입니다.</div>
    <input type="password" class="field-input" id="passInput" placeholder="관리자 비밀번호" autocomplete="off">
    <div class="field-error" id="passError"></div>
    <button class="primary-btn" onclick="adminLogin()">로그인</button>
  </div>

  <!-- MAIN -->
  <div id="mainView" style="display:none;flex:1;flex-direction:column;">
    <div class="topbar">
      <div>
        <div class="eyebrow">VOICE OF YUHAN · ADMIN</div>
        <div class="topbar-title">인증 · 교육 이수 관리</div>
      </div>
      <div class="topbar-actions">
        <span class="ghost-btn" id="versionBadge" style="cursor:default;">백엔드 확인 중...</span>
        <button class="ghost-btn" onclick="loadRequests()">새로고침</button>
        <button class="ghost-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="tabBtn-auth" onclick="switchTab('auth')">인증 관리</button>
      <button class="tab-btn" id="tabBtn-manual" onclick="switchTab('manual')">매뉴얼 보기</button>
    </div>

    <div id="tabView-auth">
      <div class="stats-row">
        <div class="stat-card filter-card active" id="filterCard-all" onclick="setFilter('all')">
          <div class="stat-num mono" id="statTotal">0</div>
          <div class="stat-label">전체 요청</div>
        </div>
        <div class="stat-card filter-card" id="filterCard-pending" onclick="setFilter('pending')">
          <div class="stat-num mono" id="statPending">0</div>
          <div class="stat-label">승인 대기</div>
        </div>
        <div class="stat-card filter-card" id="filterCard-approved" onclick="setFilter('approved')">
          <div class="stat-num mono" id="statApproved">0</div>
          <div class="stat-label">승인 완료</div>
        </div>
        <div class="stat-card done filter-card" id="filterCard-completed" onclick="setFilter('completed')">
          <div class="stat-num mono" id="statDone">0</div>
          <div class="stat-label">교육 이수</div>
        </div>
      </div>
      <div class="filter-hint" id="filterHint" style="display:none;"></div>

      <div class="toolbar">
        <input class="search-input" id="searchInput" placeholder="이름, 사번, 이메일로 검색" oninput="setTimeout(renderTable,0)" oncompositionend="setTimeout(renderTable,0)" onkeyup="setTimeout(renderTable,0)" onkeydown="if(event.key==='Enter'){event.preventDefault();renderTable();}">
        <button class="ghost-btn" type="button" onclick="renderTable()" style="flex-shrink:0;">검색</button>
        <select class="sort-select" id="sortSelect" onchange="renderTable()">
          <option value="requestedAt-desc">요청일 최신순</option>
          <option value="requestedAt-asc">요청일 오래된순</option>
          <option value="name-asc">이름 오름차순</option>
          <option value="name-desc">이름 내림차순</option>
          <option value="email-asc">이메일 오름차순</option>
          <option value="status-asc">승인상태순</option>
        </select>
      </div>

      <div class="list-wrap" id="listWrap">
        <div class="empty" id="emptyMsg" style="display:none;">아직 인증 요청이 없어요.</div>
      </div>
    </div>

    <div id="tabView-manual" style="display:none;"></div>
  </div>

</div>

<script>
/* ---------------- 매뉴얼 전체 내용 (사용자용과 동일한 데이터) ---------------- */
const needData = [
  {text:"국가보건기관 공략의 주체는 의료인, 즉 HCP임을 명심하고 공략합시다.", sub:""},
  {text:"군 단위의 지소가 존재하는 지역은 연간 평균 70,000~90,000 약제비의 시장입니다.", sub:""},
  {text:"약제리스트 내 품목은 진료소에 상주하는 공무원이 직접 주문해 약을 확보합니다.", sub:"전국 진료소 약제리스트 또는 소속 보건소·의료원 리스트 기준"},
  {text:"확보된 약 중에서 지소의 공중보건의나 담당의가 처방을 진행합니다.", sub:""},
  {text:"따라서 진료소도 명확한 영업대상이며, 종종 방문이 필요합니다.", sub:""},
  {text:"처방통계에서 진료소 총처방액을 확인할 수 있어 이를 근거로 영업을 진행합니다.", sub:"상주 공무원 수로 의료시설 규모를 가늠할 수 있습니다."}
];
const stepData = [
  {title:"입찰공고 확인",
   items:["나라장터에 접속해 입찰공고목록을 확인합니다.", "상세조건에서 공고기관에 담당 보건소·의료원을 검색하거나, 공고명에 보건지소·의약품을 검색합니다."],
   links:[{label:"나라장터 바로가기", url:"https://www.g2b.go.kr"}]},
  {title:"낙찰 결과 및 약정 확인",
   items:["해당 공고에서 의약품 리스트와 총 예산을 확인합니다.", "기관마다 리스트 변경 가능 기간이 다르므로 기관별로 별도 확인이 필요합니다.", "리스트에 속한 제품만 지소에서 주문할 수 있습니다."],
   note:"낙찰 도매상 확인 후 팀장·입찰팀이 약정을 협상하고 영업을 시작합니다."},
  {title:"지소별 실적 확인",
   items:["해당 군청의 사전정보공표 게시판에 접속합니다.", "제약회사별 약 소모 통계 문서에서 지소·진료소별 처방금액과 경쟁제품 통계를 확인합니다.", "통계가 없는 경우 정보공개포털에서 정보청구를 진행합니다."],
   links:[{label:"정보공개포털 바로가기", url:"https://www.open.go.kr"}]},
  {title:"정보공개청구로 통계 확보",
   items:["정보청구 대상을 해당 시군구로 설정해 청구합니다.", "시군구 기록연구사를 거쳐 보건소 의약품 통계 담당자에게 자동 이관됩니다.", "처방통계가 첨부된 답변을 받게 됩니다."]}
];
const tipData = [
  {text:"매년 4~5월은 신규 선생님 발령과 지역이동이 진행되는 시기이니 방문을 철저히 합니다."},
  {text:"공중보건의를 대상으로 제품설명회를 진행합니다.", sub:"인원이 부족할 때는 의료원·보건소 선생님도 포함합니다."},
  {text:"입대자 부족으로 1명이 지소 2~3곳을 담당하고 봉직의 고용도 많아, 초반 영업활동이 특히 중요합니다."},
  {text:"가장 선호되는 영업 툴은 1박 2일 숙박 심포지엄입니다.", sub:"신규 근무가 시작되는 4~5월에는 초대에 집중이 필요합니다."},
  {text:"처방통계를 확인하면 경쟁사 제품이나 의미 없이 쓰이는 제품의 교체 제안이 수월합니다."},
  {text:"약제리스트 특성상 신제품 진입은 어렵지만, 일단 리스트에 등록되면 처방량이 많습니다."},
  {text:"입찰 도매상이 약정에 따라 임의로 주문을 거절하는 경우가 있어 사전 협의가 필요합니다."},
  {text:"도매상의 업무 숙련도에 따라 원하는 시기에 배송이 안 되어 클레임이 발생할 수 있습니다."},
  {text:"공중보건의끼리 친한 경우가 많아, 특정 인물만 심포지엄에 초대하면 역효과가 날 수 있습니다."},
  {text:"공중보건의 교체 시기를 놓치면 기존 처방이 한 번에 사라질 수 있습니다."},
  {text:"보건소·의료원은 봉직의 근무가 많아 일반 의원과 영업방식이 비슷합니다.", sub:"제품설명회에 한의사·치과 공보의 참석을 요구하는 경우도 있어 사전 설명이 필요합니다."}
];

function pad(n){ return String(n).padStart(2,'0'); }

function renderManual(){
  const wrap = document.getElementById('tabView-manual');
  let html = '';

  html += `<div class="manual-section"><div class="manual-section-title">1 · 공략의 필요성</div>`;
  needData.forEach((d,i)=>{
    html += `<div class="manual-item"><div class="manual-item-num mono">WHY ${pad(i+1)}</div><div class="manual-item-body"><div class="manual-item-text">${d.text}</div>${d.sub?`<div class="manual-item-sub">${d.sub}</div>`:''}</div></div>`;
  });
  html += `</div>`;

  html += `<div class="manual-section"><div class="manual-section-title">2 · 업무 Flow</div>`;
  stepData.forEach((d,i)=>{
    const linksHtml = d.links ? `<div class="manual-links">${d.links.map(l=>`<a class="manual-link" href="${l.url}" target="_blank" rel="noopener">${l.label} ↗</a>`).join('')}</div>` : '';
    html += `<div class="manual-item"><div class="manual-item-num mono">STEP ${pad(i+1)}</div><div class="manual-item-body">
      <div class="manual-item-title">${d.title}</div>
      <ul class="manual-list">${d.items.map(t=>`<li>${t}</li>`).join('')}</ul>
      ${d.note?`<div class="manual-note">${d.note}</div>`:''}
      ${linksHtml}
    </div></div>`;
  });
  html += `</div>`;

  html += `<div class="manual-section"><div class="manual-section-title">3 · 국가보건기관 공략 Tip</div>`;
  tipData.forEach((d,i)=>{
    html += `<div class="manual-item"><div class="manual-item-num mono">TIP ${pad(i+1)}</div><div class="manual-item-body"><div class="manual-item-text">${d.text}</div>${d.sub?`<div class="manual-item-sub">${d.sub}</div>`:''}</div></div>`;
  });
  html += `</div>`;

  wrap.innerHTML = html;
}

function switchTab(tab){
  document.getElementById('tabBtn-auth').classList.toggle('active', tab==='auth');
  document.getElementById('tabBtn-manual').classList.toggle('active', tab==='manual');
  document.getElementById('tabView-auth').style.display = tab==='auth' ? 'block' : 'none';
  document.getElementById('tabView-manual').style.display = tab==='manual' ? 'block' : 'none';
  if(tab==='manual' && !document.getElementById('tabView-manual').innerHTML){
    renderManual();
  }
}
</script>
<script>
document.addEventListener('keydown', function(e){
  const k = (e.key || '').toUpperCase();
  if (k === 'F12') { e.preventDefault(); return; }
  if (e.ctrlKey && e.shiftKey && (k === 'I' || k === 'J' || k === 'C')) { e.preventDefault(); return; }
  if (e.ctrlKey && (k === 'U' || k === 'S')) { e.preventDefault(); return; }
  if (e.metaKey && e.altKey && (k === 'I' || k === 'J' || k === 'C')) { e.preventDefault(); return; }
});

// 배포한 Google Apps Script 웹 앱 URL(.../exec)을 여기에 붙여넣으세요.
const API_URL = "https://script.google.com/macros/s/AKfycbw0C37EbKZ8k_y51-m2WxN0CXGoz74Aw0__gKHiKB2Nf_9Orku1Ceb9qdrA8Frldmkazg/exec";

async function apiCall(action, payload){
  if(!API_URL || API_URL.indexOf('여기에') === 0){
    return { ok:false, error:'no_api_url' };
  }
  try{
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({action}, payload))
    });
    return await res.json();
  }catch(err){
    return { ok:false, error:'network' };
  }
}

function fmtTime(ts){
  if(!ts) return '-';
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function showVersionBadge(version){
  const el = document.getElementById('versionBadge');
  if(!el) return;
  if(version){
    el.textContent = '백엔드 ' + version;
    el.style.color = 'var(--muted)';
  } else {
    el.textContent = '⚠ 백엔드 재배포 필요';
    el.style.color = 'var(--danger)';
  }
}

function actionErrorMessage(res){
  if(res.error === 'no_api_url') return '서버 주소(API_URL)가 설정되지 않았어요.';
  if(res.error === 'unauthorized') return '세션이 만료됐어요. 다시 로그인해주세요.';
  if(res.error === 'unknown_action' || !res.error) return '이 기능이 아직 서버에 반영되지 않았어요. Code.gs를 최신 버전으로 재배포해주세요.';
  if(res.error === 'not_found') return '이미 삭제되었거나 존재하지 않는 요청이에요. 새로고침해주세요.';
  return '요청이 실패했어요. (' + res.error + ')';
}

let allRequests = [];
let sortKey = 'requestedAt';
let sortDir = 'desc';
let currentFilter = 'all';

const FILTER_LABELS = {
  all: null,
  pending: '승인 대기 중인 사람만 보고 있어요',
  approved: '승인된 사람만 보고 있어요 (이수 여부 무관)',
  completed: '교육 이수를 완료한 사람만 보고 있어요'
};

function setFilter(f){
  currentFilter = f;
  ['all','pending','approved','completed'].forEach(k=>{
    document.getElementById('filterCard-'+k).classList.toggle('active', k === f);
  });
  const hint = document.getElementById('filterHint');
  if(FILTER_LABELS[f]){
    hint.style.display = 'block';
    hint.textContent = FILTER_LABELS[f] + ' · 전체 보기는 "전체 요청" 카드를 눌러주세요.';
  } else {
    hint.style.display = 'none';
  }
  renderTable();
}

async function adminLogin(){
  const pass = document.getElementById('passInput').value;
  const err = document.getElementById('passError');
  const res = await apiCall('listRequests', {adminPass: pass});
  if(!res.ok){
    err.textContent = res.error === 'no_api_url' ? '서버 주소(API_URL)가 설정되지 않았어요.' : '비밀번호가 올바르지 않아요.';
    return;
  }
  err.textContent = '';
  sessionStorage.setItem('voy-admin-pass', pass);
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('mainView').style.display = 'flex';
  allRequests = res.list;
  showVersionBadge(res.version);
  renderTable();
}
function doLogout(){
  sessionStorage.removeItem('voy-admin-pass');
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
  document.getElementById('passInput').value = '';
}

async function loadRequests(){
  const pass = sessionStorage.getItem('voy-admin-pass');
  if(!pass){ doLogout(); return; }
  const res = await apiCall('listRequests', {adminPass:pass});
  if(!res.ok){ doLogout(); return; }
  allRequests = res.list;
  showVersionBadge(res.version);
  renderTable();
}

function norm_(s){
  s = String(s == null ? '' : s).toLowerCase().trim();
  try { return s.normalize('NFC'); } catch(e) { return s; }
}

function renderTable(){
  const q = norm_(document.getElementById('searchInput').value);
  const sortSelectVal = document.getElementById('sortSelect').value;

  let list = allRequests.filter(r=>{
    if(currentFilter === 'pending' && r.status !== 'pending') return false;
    if(currentFilter === 'approved' && r.status !== 'approved') return false;
    if(currentFilter === 'completed' && !r.completed) return false;
    if(!q) return true;
    return norm_(r.name).includes(q) || norm_(r.email).includes(q) || norm_(r.employeeId).includes(q);
  });

  let key = 'requestedAt', dir = 'desc';
  if(sortSelectVal && sortSelectVal.indexOf('-') > -1){
    const [k,d] = sortSelectVal.split('-');
    key = k; dir = d;
  }

  list = [...list].sort((a,b)=>{
    let av = a[key], bv = b[key];
    if(key === 'completed'){ av = a.completed ? 1 : 0; bv = b.completed ? 1 : 0; }
    if(typeof av === 'string') av = av.toLowerCase();
    if(typeof bv === 'string') bv = bv.toLowerCase();
    if(av < bv) return dir === 'asc' ? -1 : 1;
    if(av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });

  document.getElementById('statTotal').textContent = allRequests.length;
  document.getElementById('statPending').textContent = allRequests.filter(r=>r.status==='pending').length;
  document.getElementById('statApproved').textContent = allRequests.filter(r=>r.status==='approved').length;
  document.getElementById('statDone').textContent = allRequests.filter(r=>r.completed).length;

  const listWrap = document.getElementById('listWrap');
  if(list.length === 0){
    listWrap.innerHTML = `<div class="empty">${allRequests.length === 0 ? '아직 인증 요청이 없어요.' : '검색 결과가 없어요.'}</div>`;
    return;
  }

  listWrap.innerHTML = list.map(r=>`
    <div class="req-card">
      <div class="req-row1">
        <span class="req-name">${escapeHtml(r.name || '(이름 없음)')}</span>
        <div class="req-badges">
          <span class="badge ${r.status}">${r.status==='approved' ? '승인됨' : '대기중'}</span>
          <span class="badge ${r.completed ? 'done' : 'notdone'}">${r.completed ? '이수완료' : '미완료'}</span>
        </div>
        <div class="req-field"><span class="req-field-label">사번</span><span class="req-field-value mono">${escapeHtml(r.employeeId || '-')}</span></div>
        <div class="req-field"><span class="req-field-label">이메일</span><span class="req-field-value mono">${escapeHtml(r.email)}</span></div>
        <div class="req-field"><span class="req-field-label">신청일</span><span class="req-field-value mono">${fmtTime(r.requestedAt)}</span></div>
        <div class="req-field"><span class="req-field-label">이수일자</span><span class="req-field-value mono">${r.completed ? fmtTime(r.completedAt) : '-'}</span></div>
      </div>
      <div class="req-row2">
        <div class="req-field" id="key-cell-${r.id}"><span class="req-field-label">키</span><span class="req-field-value">${r.key ? `<span class="key-chip">${r.key}</span> <button class="btn-copy" onclick="copyKey('${r.key}')">복사</button>` : '-'}</span></div>
        <div class="action-cell">
          ${r.status==='pending'
            ? `<button class="btn-approve" onclick="approveRequest('${r.id}')">승인하기</button>`
            : `<button class="btn-revoke" onclick="revokeRequest('${r.id}')">인증키 삭제</button>`
          }
          <button class="btn-revoke" onclick="deleteUser('${r.id}')">사용자 삭제</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

async function approveRequest(id){
  const pass = sessionStorage.getItem('voy-admin-pass');
  const res = await apiCall('approve', {id, adminPass:pass});
  if(!res.ok){ alert(actionErrorMessage(res)); return; }
  loadRequests();
}

async function revokeRequest(id){
  if(!confirm('이 사용자의 인증키를 삭제할까요? 삭제하면 해당 로그인 키로는 더 이상 로그인할 수 없어요. (신청 기록은 남고, 다시 승인할 수 있어요)')) return;
  const cell = document.getElementById('key-cell-'+id);
  if(cell) cell.innerHTML = '<span class="req-field-label">키</span><span class="req-field-value">삭제 중...</span>';
  const pass = sessionStorage.getItem('voy-admin-pass');
  const res = await apiCall('revoke', {id, adminPass:pass});
  if(!res.ok){ alert(actionErrorMessage(res)); loadRequests(); return; }
  if(cell) cell.innerHTML = '<span class="req-field-label">키</span><span class="req-field-value">-</span>';
  loadRequests();
}

async function deleteUser(id){
  if(!confirm('이 신청자를 목록에서 완전히 삭제할까요? 이름·이메일·인증 기록이 모두 사라지며 되돌릴 수 없습니다.')) return;
  const pass = sessionStorage.getItem('voy-admin-pass');
  const res = await apiCall('deleteUser', {id, adminPass:pass});
  if(!res.ok){ alert(actionErrorMessage(res)); return; }
  loadRequests();
}

function copyKey(key){
  if(navigator.clipboard){ navigator.clipboard.writeText(key).catch(()=>{}); }
}
</script>
